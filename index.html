<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thriftify</title>

<style>
:root {
    --bg: #0d0d0d;
    --card: #1a1a1a;
    --accent: #e60023;
    --text: #ffffff;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: black;
    border-bottom: 1px solid #222;
}

header h1 {
    color: var(--accent);
    margin: 0;
}

/* HERO */
.hero {
    text-align: center;
    padding: 60px 20px;
}

.hero h2 {
    font-size: 2.5rem;
    color: var(--accent);
}

/* FILTER */
.filter {
    text-align: center;
    margin: 20px;
}

.filter button {
    background: #222;
    color: white;
    border: none;
    padding: 10px 15px;
    margin: 5px;
    cursor: pointer;
    border-radius: 20px;
}

.filter button:hover {
    background: var(--accent);
}

/* PRODUCTS */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 25px;
    padding: 20px 40px;
}

.product {
    background: var(--card);
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}

.product:hover {
    transform: translateY(-8px);
}

.product img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

.product-info {
    padding: 15px;
}

.product-info h3 {
    margin: 0;
}

.price {
    color: var(--accent);
    margin: 8px 0;
    font-weight: bold;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: black;
    margin-top: 30px;
}
</style>
</head>

<body>

<header>
    <h1>Thriftify</h1>
</header>

<div class="hero">
    <h2>Step Into Style</h2>
    <p>Premium thrifted shoes at unbeatable prices</p>
</div>

<div class="filter">
    <button onclick="filter('all')">All</button>
    <button onclick="filter('Nike')">Nike</button>
    <button onclick="filter('Adidas')">Adidas</button>
    <button onclick="filter('Puma')">Puma</button>
</div>

<div class="products" id="products"></div>

<footer>
    <p>© 2026 Thriftify</p>
</footer>

<script>

];

function display(list) {
    let container = document.getElementById("products");
    container.innerHTML = "";

    list.forEach(item => {
        container.innerHTML += `
        <div class="product">
            <img src="${item.img}">
            <div class="product-info">
                <h3>${item.name}</h3>
                <p class="price">${item.price}</p>
                <button onclick="order('${item.name}')">Order on WhatsApp</button>
            </div>
        </div>
        `;
    });
}

function filter(brand) {
    if(brand === "all") display(items);
    else display(items.filter(i => i.brand === brand));
}

function order(product) {
    let msg = "Hello, I want to order: " + product;
    window.open("https://wa.me/" + phone + "?text=" + encodeURIComponent(msg));
}

display(items);
</script>
